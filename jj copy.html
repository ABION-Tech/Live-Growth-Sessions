<!DOCTYPE html>
<html lang="en">
<head>
<style>

/* FOOTER */
footer {
  background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);
  padding: 60px 80px;
  border-top: 1px solid rgba(212,176,122,0.2);
  position: relative;
  overflow: hidden;
}

footer::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(212,176,122,0.02) 0%, transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(74,144,226,0.02) 0%, transparent 50%);
  pointer-events: none;
}

.footer-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 48px;
  position: relative;
  z-index: 1;
}

.footer-brand {
  max-width: 320px;
}

.footer-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  color: #f7f3ec;
  text-decoration: none;
  display: inline-block;
  margin-bottom: 16px;
}

.footer-logo span {
  color: #d4b07a;
}

.footer-tagline {
  font-size: 13px;
  line-height: 1.7;
  color: rgba(247,243,236,0.4);
}

.footer-socials {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.footer-socials a {
  width: 36px;
  height: 36px;
  border: 1px solid rgba(212,176,122,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: #b8b8b8;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.footer-socials a:hover {
  border-color: #d4b07a;
  color: #d4b07a;
  background: rgba(212,176,122,0.08);
}

.footer-cols {
  display: flex;
  gap: 64px;
}

.footer-col-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #d4b07a;
  margin-bottom: 20px;
}

.footer-col-links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.footer-col-links a {
  font-size: 13px;
  color: rgba(247,243,236,0.45);
  text-decoration: none;
  transition: all 0.3s ease;
}

.footer-col-links a:hover {
  color: #d4b07a;
  transform: translateX(4px);
}

.footer-bottom {
  border-top: 1px solid rgba(212,176,122,0.25);
  padding-top: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}

.footer-copy {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(247,243,236,0.2);
  letter-spacing: 0.08em;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  footer {
    padding: 48px 24px;
  }

  .footer-top {
    flex-direction: column;
    gap: 40px;
    margin-bottom: 40px;
  }

  .footer-brand {
    max-width: 100%;
  }

  .footer-cols {
    flex-direction: column;
    gap: 32px;
    width: 100%;
  }

  .footer-bottom {
    flex-direction: column;
    gap: 16px;
    text-align: center;
  }
}

@media (max-width: 480px) {
  footer {
    padding: 40px 20px;
  }

  .footer-logo {
    font-size: 20px;
  }

  .footer-socials {
    flex-wrap: wrap;
  }

  .footer-copy {
    font-size: 9px;
  }
}

</style>

  <meta charset="UTF-8">

</head>
